<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em Manutenção | Atelier Ana Alexandre</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A96E;
            --dark: #1a1a1a;
            --cream: #FAF8F5;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--dark);
            color: white;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.4;
            background: radial-gradient(circle at 20% 30%, #C9A96Eaa 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, #a88a53aa 0%, transparent 40%),
                        radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
            filter: blur(60px);
            animation: moveColors 20s infinite alternate;
        }

        @keyframes moveColors {
            from { transform: scale(1) translate(0, 0); }
            to { transform: scale(1.2) translate(5%, 5%); }
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 600px;
            padding: 40px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        h1 span {
            font-style: italic;
            color: var(--gold);
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            opacity: 0.8;
            margin-bottom: 3rem;
            font-weight: 300;
        }

        .btn-back {
            display: inline-block;
            text-decoration: none;
            color: black;
            background: var(--gold);
            padding: 18px 40px;
            font-weight: 700;
            letter-spacing: 0.2em;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: white;
            transform: translateY(-5px);
        }

        .status-badge {
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="canvas"></div>
    
    <main class="content">
        <div class="status-badge">Work in Progress</div>
        <h1>Estamos a misturar <span>as cores.</span></h1>
        <p>A nossa tela digital está a secar. Em breve, poderá explorar o novo website completo. Por agora, continue a acompanhar as nossas obras na galeria principal.</p>
        
        <a href="index.html" class="btn-back">VOLTAR À GALERIA</a>
    </main>
</body>
</html>
